<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Paper Crafts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/contact.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1><i class="fas fa-paper-plane"></i> What I Love</h1>
            <p>Paper Crafts & Home Decor</p>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="contact-hero">
            <h2>Let's Share Craft Ideas</h2>
            <p>Ask for tips, show me your projects, or just say hi</p>
        </section>

        <form class="contact-form">
            <h3><i class="fas fa-envelope"></i> Send a Message</h3>

            <div class="form-group">
                <label for="name">Your Name *</label>
                <input type="text" id="name" name="name" required placeholder="e.g., Sam">
            </div>

            <div class="form-group">
                <label for="age">Age (optional)</label>
                <input type="number" id="age" name="age" placeholder="Your age">
            </div>

            <div class="form-group">
                <label>I'm interested in...</label>
                <div class="radio-group">
                    <label><input type="radio" name="interest" value="tips"> Getting craft tips</label>
                    <label><input type="radio" name="interest" value="share"> Sharing my own crafts</label>
                    <label><input type="radio" name="interest" value="collab"> Collaborating on a zine</label>
                </div>
            </div>

            <div class="form-group">
                <label>Paper crafts I enjoy (check all that apply)</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="craft" value="origami"> Origami</label>
                    <label><input type="checkbox" name="craft" value="quilling"> Quilling</label>
                    <label><input type="checkbox" name="craft" value="flowers"> Paper flowers</label>
                    <label><input type="checkbox" name="craft" value="decoupage"> Decoupage</label>
                    <label><input type="checkbox" name="craft" value="garlands"> Garlands</label>
                </div>
            </div>

            <div class="form-group">
                <label for="skill">How much do you love paper crafts? (1 = just starting, 10 = obsessed)</label>
                <input type="range" id="skill" name="skill" min="0" max="10" value="8">
            </div>

            <div class="form-group">
                <label for="message">Your message *</label>
                <textarea id="message" name="message" rows="5" required placeholder="Tell me about your favourite paper craft project or ask for advice..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
        </form>

        <div class="social">
            <p>Follow my craft journey:</p>
            <div class="social-icons">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-pinterest"></i>
                <i class="fab fa-youtube"></i>
            </div>
            <a href="#top" class="back-link">↑ Back to Top</a>
        </div>
    </main>

    <footer>
        <p>© 2025 - What I Love: Paper Crafts & Home Decor | Made with <i class="fas fa-heart"></i> & paper</p>
    </footer>

</body>
</html>
